{% extends "layout.html" %}

{% block content %}

<div class="telegraph">

  <div class="telegraph__container">
    <!-- OUTPUT (dominant display area) -->
    <div id="telegraph-output" class="telegraph__output"></div>

    <!-- TELEGRAPH KEY (clickable input area) -->
    <div id="telegraph-key" class="telegraph__key"></div>

    <!-- FOOTER -->
    <div class="telegraph__footer">
      <div class="telegraph__divider"></div>

      <div class="time-control">
        <button id="play-btn" class="time-control__play-btn" aria-label="Play morse code">
          ▶
        </button>

        <span class="time-control__label">TIME UNIT</span>

        <input type="range"
               id="time-slider"
               class="time-control__slider"
               min="100"
               max="1000"
               value="200"
               step="50"
               aria-label="Morse code time unit in milliseconds">

        <span id="time-value" class="time-control__value">200</span>
        <span class="time-control__unit">ms</span>

        <button id="clear-btn" class="time-control__action-btn" aria-label="Clear output">
          ⌫
        </button>

        {% if logged_in %}
          <button id="save-note-btn" class="time-control__action-btn" aria-label="Save as note">
            ✎
          </button>

          <button id="comment-btn" class="time-control__action-btn" aria-label="Post to comments">
            ✉
          </button>
        {% endif %}
      </div>
    </div>
  </div>

</div>

{% endblock %}

{% block links %}
<link rel="stylesheet" href="/static/css/telegraph.css">
<script type="module" src="/static/js/telegraph.js"></script>
{% endblock %}
