{% extends "layout.html" %}

{% block content %}

<div class="translator">

  <div class="translator__container">
    <!-- Two-panel layout -->
    <div class="translator__grid">
      
      <!-- TEXT PANEL -->
      <div class="translator__panel">
        <div class="translator__panel-label">TEXT</div>
        <textarea id="text-input" 
                  class="translator__input" 
                  placeholder="Enter your message..."></textarea>
      </div>

      <!-- DIVIDER LINE -->
      <div class="translator__divider"></div>

      <!-- MORSE PANEL -->
      <div class="translator__panel">
        <div class="translator__panel-label">MORSE</div>
        <textarea id="morse-input" 
                  class="translator__input" 
                  placeholder=".-.-..-./-.-----..-.-./--........---...-.-.-.-.-.-.-.-.-"></textarea>
      </div>
    </div>

    <div class="translator__footer">
      <div class="translator__divider-line"></div>
      
      <div class="time-control">
        <button id="play-btn" class="time-control__play-btn" aria-label="Play morse code">
          ▶
        </button>
        
        <span class="time-control__label">TIME UNIT</span>
        
        <input type="range" 
               id="time-slider" 
               class="time-control__slider" 
               min="100" 
               max="1000" 
               value="200" 
               step="50"
               aria-label="Morse code time unit in milliseconds">
        
        <span id="time-value" class="time-control__value">200</span>
        <span class="time-control__unit">ms</span>
      </div>
    </div>
  </div>

</div>

{% endblock %}

{% block links %}
<link rel="stylesheet" href="/static/css/translator.css">
<script type="module" src="/static/js/translator.js"></script>
{% endblock %}
