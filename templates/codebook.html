{% extends "layout.html" %}

{% block content %}

<div class="codebook">

  <div class="codebook__nav">
    <button type="button" id="prev-btn" class="codebook__nav-btn" aria-label="Previous section">
      ← PREV
    </button>

    <h2 id="table-title" class="codebook__title">
      LETTERS
    </h2>

    <button type="button" id="next-btn" class="codebook__nav-btn" aria-label="Next section">
      NEXT →
    </button>
  </div>

  <div class="codebook__table-wrapper">
    <table class="codebook__table">
      <tbody id="codebook-body">
        {% if letters_dict %}
          {% for char, morse in letters_dict.items() %}
            <tr class="codebook__row" data-char="{{ char }}" data-morse="{{ morse }}">
              <td class="codebook__char">
                {{ char }}
              </td>
              <td class="codebook__morse">
                {{ morse }}
              </td>
            </tr>
          {% endfor %}
        {% endif %}
      </tbody>
    </table>
  </div>

  <div class="codebook__footer">
    <div class="codebook__divider"></div>

    <div class="time-control">
      <span class="time-control__label">
        TIME UNIT
      </span>

      <input
        type="range"
        id="time-slider"
        class="time-control__slider"
        min="100"
        max="1000"
        value="200"
        step="50"
        aria-label="Morse code time unit in milliseconds"
      >

      <span id="time-value" class="time-control__value">
        200
      </span>

      <span class="time-control__unit">
        ms
      </span>
    </div>

    <div class="codebook__note">
      click any row to hear the morse code
    </div>
  </div>

</div>

{% endblock %}

{% block links %}
<link rel="stylesheet" href="/static/css/codebook.css">
<script type="module" src="/static/js/codebook.js"></script>
{% endblock %}
