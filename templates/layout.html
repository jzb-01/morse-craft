<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Morse-Craft - Learn and practice Morse code with interactive tools" />
  
  <title>Morse-Craft</title>

  <link rel="stylesheet" href="/static/css/layout.css" />

  {% block links %}{% endblock %}
</head>

<body>

  <header class="site-header">
    <div class="brand">
      <h1 class="brand__title">MORSE·CRAFT</h1>
      <p class="brand__tagline">the art of transmission</p>
    </div>

    <nav class="main-nav" aria-label="Main navigation">
      <ul class="main-nav__list">
        <li><a href="/" class="main-nav__link">HOME</a></li>
        <li><a href="/codebook" class="main-nav__link">CODEBOOK</a></li>
        <li><a href="/archive" class="main-nav__link">ARCHIVES</a></li>
        <li><a href="/notes" class="main-nav__link">NOTES</a></li>
        <li><a href="/comments" class="main-nav__link">COMMENTS</a></li>
        <li>
          {% if session.get("user_id") %}
            <a href="/account" class="main-nav__link">ACCOUNT</a>
          {% else %}
            <a href="/auth" class="main-nav__link">LOG IN</a>
          {% endif %}
        </li>
        <li class="dropdown">
          <button class="dropdown__trigger" aria-expanded="false" aria-haspopup="true">
            TOOLS ▼
          </button>
          <div class="dropdown__menu" aria-label="Tools submenu">
            <a href="/translator" class="dropdown__link">TRANSLATOR</a>
            <a href="/telegraph" class="dropdown__link">TELEGRAPH</a>
            <a href="/training" class="dropdown__link">TRAINING</a>
          </div>
        </li>
      </ul>
    </nav>
  </header>

  <main class="main-content">
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </main>

</body>

</html>
