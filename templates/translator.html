<!-- translator.html -->
{% extends "layout.html" %}

{% block content %}
<section class="translator-page">

  <div class="translator-container">
    
    <!-- Title removed as requested -->

    <!-- Two-panel layout -->
    <div class="translator-grid">
      
      <!-- TEXT PANEL -->
      <div class="translator-panel">
        <div class="panel-label">TEXT</div>
        <textarea id="textInput" class="translator-input" placeholder="Enter your message..."></textarea>
      </div>

      <!-- DIVIDER LINE -->
      <div class="panel-divider"></div>

      <!-- MORSE PANEL -->
      <div class="translator-panel">
        <div class="panel-label">MORSE</div>
        <textarea id="morseInput" class="translator-input" placeholder=".-.-..-./-.-----..-.-./--........---...-.-.-.-.-.-.-.-.-"></textarea>
      </div>

    </div>

    <div class="translator-footer">
      <div class="footer-dashed"></div>
      
      <div class="time-unit-control">
        <button id="playButton" class="play-button">▶</button>
        <span class="time-label">TIME UNIT</span>
        <input type="range" id="timeSlider" class="time-slider" min="100" max="1000" value="200" step="50">
        <span id="timeValue" class="time-value">200</span>
        <span class="time-unit-ms">ms</span>
      </div>
    </div>

  </div>

</section>
{% endblock %}

{% block links %}
<link rel="stylesheet" href="/static/css/translator.css">
<script type="module" src="/static/js/translator.js"></script>
{% endblock %}
